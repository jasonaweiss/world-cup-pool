// Matches. side refs: a team name OR {w:"matchId"} (winner of) .

  {id:"r32-12", round:"R32", date:"Thu Jul 2",  time:"7:00 PM ET",  venue:"BMO Field, Toronto", a:"Portugal", b:"Croatia", s1:2, s2:1, w:"Portugal"},
  {id:"r32-13", round:"R32", date:"Thu Jul 2",  time:"11:00 PM ET", venue:"BC Place, Vancouver", a:"Switzerland", b:"Algeria", s1:2, s2:0, w:"Switzerland"},
  {id:"r32-14", round:"R32", date:"Fri Jul 3",  time:"2:00 PM ET",  venue:"AT&T Stadium, Arlington", a:"Australia", b:"Egypt"},

  {id:"qf-2", round:"QF", date:"Fri Jul 10", time:"3:00 PM ET", venue:"SoFi Stadium, Inglewood", a:{w:"r16-5"}, b:{w:"r16-6"}},
  {id:"qf-3", round:"QF", date:"Sat Jul 11", time:"5:00 PM ET", venue:"Hard Rock Stadium, Miami", a:{w:"r16-3"}, b:{w:"r16-4"}},
  {id:"qf-4", round:"QF", date:"Sat Jul 11", time:"9:00 PM ET", venue:"Arrowhead Stadium, Kansas City", a:{w:"r16-7"}, b:{w:"r16-8"}},
  // ---- Semifinals ----
  {id:"sf-1", round:"SF", date:"Tue Jul 14", time:"3:00 PM ET", venue:"AT&T Stadium, Arlington", a:{w:"qf-1"}, b:{w:"qf-2"}},
  {id:"sf-2", round:"SF", date:"Wed Jul 15", time:"3:00 PM ET", venue:"Mercedes-Benz Stadium, Atlanta", a:{w:"qf-3"}, b:{w:"qf-4"}},
  // ---- Third place + Final ----
  {id:"third", round:"3rd", date:"Sat Jul 18", time:"5:00 PM ET", venue:"Hard Rock Stadium, Miami", a:{l:"sf-1"}, b:{l:"sf-2"}},
  {id:"final", round:"Final", date:"Sun Jul 19", time:"3:00 PM ET", venue:"MetLife Stadium, East Rutherford", a:{w:"sf-1"}, b:{w:"sf-2"}}
];
const LAST_UPDATED = "Updated Jul 3, 2026. Spain 3-0 Austria; Portugal 2-1 Croatia; Switzerland 2-0 Algeria.";

/* ====== LOGIC ====== */
const byId = Object.fromEntries(MATCHES.map(m=>[m.id,m]));
const ROUND_ORDER = ["R32","R16","QF","SF","Final"];
const ROUND_LABEL = {R32:"Round of 32",R16:"Round of 16",QF:"Quarterfinals",SF:"Semifinals","3rd":"Third Place",Final:"Final"};
function winnerOf(id){ const m=byId[id]; return m && m.w ? m.w : null; }
function loserOf(id){ const m=byId[id]; if(!m||!m.w) return null; const a=resolveSide(m.a),b=resolveSide(m.b); if(a&&b) return m.w===a?b:a; return null; }
function resolveSide(side){
  if(typeof side==="string") return side;
  if(side && side.w) return winnerOf(side.w);
  if(side && side.l) return loserOf(side.l);
  return null;
}
function sideLabel(side){
  if(typeof side==="string") return side;
  const r = resolveSide(side);
  if(r) return r;
  if(side.w){ const m=byId[side.w]; return shortPair(m); }
  if(side.l){ const m=byId[side.l]; return "Loser "+m.round; }
  return "TBD";
}
function shortPair(m){
  const a=resolveSide(m.a), b=resolveSide(m.b);
  const sa = a?abbr(a):"?", sb = b?abbr(b):"?";
  return sa+"/"+sb+" winner";
}
function abbr(t){ return t.length>11 ? t.slice(0,10)+"…" : t; }

// Eliminations + furthest round reached per team
function computeStatus(){
  const reached = {}; // team -> round index reached (appeared in)
  const eliminated = {};
  let champion = null;
  ROUND_ORDER.forEach((rd,ri)=>{
    MATCHES.filter(m=>m.round===rd).forEach(m=>{
      const a=resolveSide(m.a), b=resolveSide(m.b);
      [a,b].forEach(t=>{ if(t) reached[t]=Math.max(reached[t]??-1, ri); });
      if(m.w){
        const lo = m.w===a?b:(m.w===b?a:null);
        if(lo) eliminated[lo]=m.round;
        if(m.round==="Final") champion=m.w;
      }
    });
  });
  return {reached, eliminated, champion};
}
const FURTHEST = ["Round of 32","Round of 16","Quarterfinal","Semifinal","Final"];

/* ====== RENDER ====== */
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

function renderLegend(){
  const L=document.getElementById("legend"); L.innerHTML="";
  Object.entries(MANAGERS).forEach(([n,m])=>{
    const s=el("span",null,`<span class="dot" style="background:${m.color}"></span>${n}`);
    L.appendChild(s);
  });
}

// Order each round top-to-bottom by the bracket tree (DFS from the final),
// so every match lines up to the right of the two games that feed it.
function buildBracketOrder(){
  const order={R32:[],R16:[],QF:[],SF:[],Final:[]};
  const seen={};
  function visit(id){
    const m=byId[id]; if(!m||seen[id]) return; seen[id]=1;
    if(order[m.round]) order[m.round].push(m);
    [m.a,m.b].forEach(s=>{ if(s&&s.w) visit(s.w); });
  }
  visit("final");
  return order;
}

function renderBracket(){
  const st=computeStatus();
  const root=document.getElementById("bracket"); root.innerHTML="";
  const order=buildBracketOrder();
  const cols=[["R32","Round of 32"],["R16","Round of 16"],["QF","Quarterfinals"],["SF","Semifinals"],["Final","Final"]];
  cols.forEach(([code,label])=>{
    const col=el("div","col");
    col.appendChild(el("div","coltitle",label));
    const mc=el("div","matches");
    let list=order[code]||[];
    if(code==="Final"){ // show third place under final
      list=[byId["final"], byId["third"]];
    }
    list.forEach(m=>mc.appendChild(matchBox(m,st)));
    col.appendChild(mc);
    root.appendChild(col);
  });
}

function matchBox(m,st){
  const box=el("div","match");
  const meta=el("div","mmeta");
  meta.appendChild(el("span",null,(m.round==="3rd"?"3rd place · ":"")+m.date));
  meta.appendChild(el("span",null,m.time));
  box.appendChild(meta);
  box.appendChild(sideRow(m,m.a,st));
  box.appendChild(sideRow(m,m.b,st));
  const v=el("div","mmeta",`<span style="color:#aab1ba">${m.venue}</span>`);
  box.appendChild(v);
  return box;
}

function sideRow(m,side,st){
  const team=resolveSide(side);
  const row=el("div","side");
  const cap=el("div","cap");
  let nm, own="", sc="";
  if(team && TEAMS[team]){
    cap.style.background=MANAGERS[TEAMS[team].owner].color;
    nm=`<span class="nm">${TEAMS[team].flag} ${team}</span>`;
    own=`<span class="own">${TEAMS[team].owner}</span>`;
  } else {
    nm=`<span class="nm tbd">${sideLabel(side)}</span>`;
  }
  // score
  if(m.w!=null){
    const a=resolveSide(m.a);
    const isA = side===m.a;
    const score = isA ? m.s1 : m.s2;
    if(score!=null) sc=`<span class="sc">${score}</span>`;
    if(team===m.w){ row.classList.add("win"); }
    else if(team){ row.classList.add("lose"); }
  }
  row.appendChild(cap);
  const wrap=el("div"); wrap.style.display="flex"; wrap.style.flexDirection="column"; wrap.innerHTML=nm+own;
  row.appendChild(wrap);
  if(sc) row.insertAdjacentHTML("beforeend",sc);
  if(m.w===team && m.pens){ row.insertAdjacentHTML("beforeend",`<span class="own" style="margin-left:6px">${m.pens}</span>`); }
  return row;
}

function renderManagers(){
  const st=computeStatus();
  const root=document.getElementById("managers"); root.innerHTML="";
  Object.entries(MANAGERS).forEach(([name,mm])=>{
    const teams=Object.keys(TEAMS).filter(t=>TEAMS[t].owner===name).sort((x,y)=>TEAMS[x].rank-TEAMS[y].rank);
    const alive=teams.filter(t=>!st.eliminated[t]).length;
    const card=el("div","mcard");
    const head=el("div","mhead"); head.style.background=mm.color;
    head.innerHTML=`<span class="name">${name}</span><span class="stat">${alive}/4 alive</span>`;
    card.appendChild(head);
    const body=el("div","mbody");
    teams.forEach(t=>{
      const T=TEAMS[t];
      const r=el("div","trow");
      let badge;
      if(st.champion===t) badge=`<span class="badge b-champ">🏆 Champion</span>`;
      else if(st.eliminated[t]) badge=`<span class="badge b-out">Out · ${ROUND_LABEL[st.eliminated[t]]||st.eliminated[t]}</span>`;
      else badge=`<span class="badge b-alive">${st.reached[t]!=null?FURTHEST[st.reached[t]]:"Round of 32"}</span>`;
      r.innerHTML=`<span class="flag">${T.flag}</span><span class="tname">${t}<span class="trank">#${T.rank}</span></span>${badge}`;
      body.appendChild(r);
    });
    card.appendChild(body);
    root.appendChild(card);
  });
}

function renderLeaderboard(){
  const st=computeStatus();
  const rows=Object.keys(MANAGERS).map(name=>{
    const teams=Object.keys(TEAMS).filter(t=>TEAMS[t].owner===name);
    const alive=teams.filter(t=>!st.eliminated[t]).length;
    // points: round reached index+1 summed across teams (R32=1 ... Final=5, +1 champion bonus)
    let pts=0, deepest=-1;
    teams.forEach(t=>{ const ri=st.reached[t]??0; pts+=ri; if(st.champion===t)pts+=1; deepest=Math.max(deepest,ri); });
    return {name, alive, pts, deepest};
  }).sort((a,b)=> b.pts-a.pts || b.alive-a.alive);
  const t=document.getElementById("lb");
  t.innerHTML=`<thead><tr><th>#</th><th>Manager</th><th class="num">Alive</th><th class="num">Deepest run</th><th class="num">Points</th></tr></thead>`;
  const tb=el("tbody");
  rows.forEach((r,i)=>{
    const tr=el("tr");
    tr.innerHTML=`<td class="num">${i+1}</td>`+
      `<td><span class="dot" style="background:${MANAGERS[r.name].color}"></span>${r.name}</td>`+
      `<td class="num">${r.alive}/4</td>`+
      `<td class="num">${r.deepest>=0?FURTHEST[r.deepest]:"—"}</td>`+
      `<td class="num"><b>${r.pts}</b></td>`;
    tb.appendChild(tr);
  });
  t.appendChild(tb);
}

function renderTop(){
  const st=computeStatus();
  const total=Object.keys(TEAMS).length;
  const out=Object.keys(st.eliminated).length;
  document.getElementById("topnote").innerHTML =
    `Results update daily as games finish. <b>${total-out}</b> of ${total} teams still alive. ` +
    (st.champion?`🏆 Champion: <b>${st.champion}</b> (${TEAMS[st.champion].owner}).`:`Knockout stage runs Jun 28 – Jul 19.`);
  document.getElementById("foot").innerText = LAST_UPDATED;
}

/* tabs */
document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  document.getElementById("panel-"+b.dataset.tab).classList.add("active");
}));

renderLegend(); renderBracket(); renderManagers(); renderLeaderboard(); renderTop();
</script>
</body>
</html>
